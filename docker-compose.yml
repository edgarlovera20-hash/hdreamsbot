version: '3.8'

services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/database/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASS}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  php:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/var/www/hdreams-backend
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t 2>&1 | grep -q 'successful'"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    volumes:
      - ./backend:/var/www/hdreams-backend
    command: sh -c "crontab /var/www/hdreams-backend/docker/crontab && crond -f -l 2"
    networks:
      - internal
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_API_SECRET: ${VITE_API_SECRET}
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./backend:/var/www/hdreams-backend:ro
    networks:
      - internal
      - external
    depends_on:
      - php

networks:
  internal:
    driver: bridge
  external:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
