server {
    listen 80;
    server_name api.tudominio.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript text/javascript image/svg+xml;
    gzip_vary on;

    client_max_body_size 20m;
    root /var/www/hdreams-backend/public;
    index index.php;

    location ~ /\.(env|git|htaccess)$ {
        deny all;
    }

    location ~* \.(log|sql|sh)$ {
        deny all;
    }

    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location ~ ^/webhook-.*\.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/hdreams-backend/public;
        fastcgi_read_timeout 30s;
        fastcgi_buffering off;
    }

    location /api {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT /var/www/hdreams-backend/public;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
    }

    access_log /var/log/nginx/hdreams-api-access.log;
    error_log /var/log/nginx/hdreams-api-error.log warn;
}
