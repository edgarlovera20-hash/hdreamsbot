# HTTP: redirect a HTTPS
server {
    listen 80;
    server_name bot.heavenlydreams.com.mx;
    return 301 https://bot.heavenlydreams.com.mx$request_uri;
}

# HTTPS: servidor principal
server {
    listen 443 ssl;
    http2 on;
    server_name bot.heavenlydreams.com.mx;

    ssl_certificate     /etc/letsencrypt/live/bot.heavenlydreams.com.mx/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.heavenlydreams.com.mx/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header X-Frame-Options            "SAMEORIGIN"                               always;
    add_header X-Content-Type-Options     "nosniff"                                  always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"          always;
    add_header X-XSS-Protection           "1; mode=block"                            always;
    add_header Strict-Transport-Security  "max-age=31536000; includeSubDomains"      always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript image/svg+xml;
    gzip_vary on;

    client_max_body_size 10m;

    location ~ /\.(env|git|htaccess)$ { deny all; }
    location ~* \.(log|sql|sh)$        { deny all; }

    location ~ ^/webhook-.*\.php$ {
        root /var/www/hdreams-backend/public;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT    /var/www/hdreams-backend/public;
        fastcgi_read_timeout 30s;
        fastcgi_buffering off;
    }

    location /api {
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  /var/www/hdreams-backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT    /var/www/hdreams-backend/public;
        fastcgi_param REQUEST_URI      $request_uri;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size   128k;
        fastcgi_buffers       4 256k;
    }

    location /baileys/ {
        proxy_pass         http://baileys:4000/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root    /var/www/hdreams-frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        root      /var/www/hdreams-frontend;
        try_files $uri $uri/ /index.html;
        expires   1h;
        add_header Cache-Control "public, must-revalidate";
    }

    access_log /var/log/nginx/hdreams-access.log;
    error_log  /var/log/nginx/hdreams-error.log warn;
}

# Puerto interno para que Baileys llame a PHP sin pasar por HTTPS
server {
    listen      8080;
    server_name _;

    location ~ ^/webhook-.*\.php$ {
        root /var/www/hdreams-backend/public;
        fastcgi_pass      php:9000;
        fastcgi_index     index.php;
        include           fastcgi_params;
        fastcgi_param     SCRIPT_FILENAME   $document_root$fastcgi_script_name;
        fastcgi_param     DOCUMENT_ROOT     /var/www/hdreams-backend/public;
        fastcgi_param     SERVER_NAME       bot.heavenlydreams.com.mx;
        fastcgi_param     HTTPS             on;
        fastcgi_read_timeout 30s;
        fastcgi_buffering off;
    }
}
