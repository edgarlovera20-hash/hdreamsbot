server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options            "SAMEORIGIN"                             always;
    add_header X-Content-Type-Options     "nosniff"                                always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"        always;
    add_header Permissions-Policy         "camera=(), microphone=(), geolocation=()" always;
    add_header X-XSS-Protection           "1; mode=block"                          always;

    # Gzip
    gzip             on;
    gzip_comp_level  5;
    gzip_min_length  256;
    gzip_types       text/plain text/css application/json application/javascript
                     text/javascript application/x-javascript image/svg+xml;
    gzip_vary        on;

    client_max_body_size 10m;

    # Block sensitive files
    location ~ /\.(env|git|htaccess)$ { deny all; }
    location ~* \.(log|sql|sh)$        { deny all; }

    # -------------------------------------------------------
    # Webhooks Meta (archivos PHP individuales, sin buffer)
    # -------------------------------------------------------
    location ~ ^/webhook-.*\.php$ {
        root /var/www/hdreams-backend/public;
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT    /var/www/hdreams-backend/public;
        fastcgi_read_timeout 30s;
        fastcgi_buffering off;
    }

    # -------------------------------------------------------
    # API — todo entra por index.php
    # -------------------------------------------------------
    location /api {
        fastcgi_pass  php:9000;
        fastcgi_index index.php;
        include       fastcgi_params;
        fastcgi_param SCRIPT_FILENAME  /var/www/hdreams-backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT    /var/www/hdreams-backend/public;
        fastcgi_param REQUEST_URI      $request_uri;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size   128k;
        fastcgi_buffers       4 256k;
    }

    # -------------------------------------------------------
    # Frontend SPA — assets con cache largo, fallback a index.html
    # -------------------------------------------------------
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp)$ {
        root    /var/www/hdreams-frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location / {
        root      /var/www/hdreams-frontend;
        try_files $uri $uri/ /index.html;
        expires   1h;
        add_header Cache-Control "public, must-revalidate";
    }

    access_log /var/log/nginx/hdreams-access.log;
    error_log  /var/log/nginx/hdreams-error.log warn;
}
